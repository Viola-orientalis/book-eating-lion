name: Java Spring Boot CI/CD with Docker

on:
  push:
    branches: [ "test" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
    workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./backend/gradlew
      continue-on-error: true

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/book-eating-lion-backend:test
          ${{ secrets.DOCKER_USERNAME }}/book-eating-lion-backend:v${{ github.run_number }}
          ${{ secrets.DOCKER_USERNAME }}/book-eating-lion-backend:${{ github.sha }}
  
  build-and-push-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/book-eating-lion-frontend:test
          ${{ secrets.DOCKER_USERNAME }}/book-eating-lion-frontend:v${{ github.run_number }}
          ${{ secrets.DOCKER_USERNAME }}/book-eating-lion-frontend:${{ github.sha }}
  