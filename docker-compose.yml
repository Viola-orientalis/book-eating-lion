  backend:
    build:
      context: ./backend
    container_name: book_eating_lion_backend
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Seoul
      - DB_PRIMARY_HOST=host.docker.internal
      - DB_REPLICA_HOST=host.docker.internal
      - DB_USERNAME=admin
      - DB_PASSWORD=likelion
      - DB_NAME=bookeatinglion
      - FRONTEND_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,https://ajttk.com,https://api.ajttk.com
    extra_hosts:
      - "host.docker.internal:host-gateway"
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    container_name: book_eating_lion_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
