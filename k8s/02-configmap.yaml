# 로컬 테스트 용
metadata:
  name: springboot-config
  namespace: lion-app
data:
  SPRING_PROFILES_ACTIVE: "local"
  SERVER_PORT: "28080"
  DB_HOST: "db-service"
  DB_PORT: "3306"
  DB_NAME: testdb
  SPRING_DATASOURCE_URL: "jdbc:mysql://db-service.lion-db.svc.cluster.local:3306/testdb?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul"
  SPRING_DATASOURCE_USERNAME: "root"
  SPRING_SQL_INIT_CONTINUE_ON_ERROR: "true"