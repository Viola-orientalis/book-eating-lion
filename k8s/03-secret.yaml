apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: lion-app
type: Opaque
stringData:
# 보안을 위해 GitHub Actions의 Secret 사용
  DB_USERNAME: "${DB_USERNAME}"
  DB_PASSWORD: "${DB_PASSWORD}"
  JWT_KEY: "${JWT_KEY}"
  JWT_KEYRT: "${JWT_KEYRT}"
  KAKAOPAY_SECRET_KEY: "${KAKAOPAY_SECRET_KEY}"
  api-ajttk-tls: "${API_AJTTK_TLS}"
