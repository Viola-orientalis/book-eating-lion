apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lion-ingress
  namespace: lion-app
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/subnets: "subnet-0ced85efc560711fa, subnet-0da70b1209f0ce491"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:061039804626:certificate/6000fb1e-05bd-4cc0-b265-5a621d6b2364 # ACM 인증서 ARN
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
  - host: api.ajttk.com # Route 53에 등록된 실제 도메인 주소 기입
    http:
      paths:
      # API 요청 (/api/*) -> Backend Service
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8080
---
# 그라파나 Ingress 설정
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: grafana.ajttk.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus-stack-grafana
            port:
              number: 80

