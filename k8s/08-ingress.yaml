apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lion-ingress
  namespace: lion-app
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # 💡 퍼블릭 서브넷 ID 작성
    alb.ingress.kubernetes.io/subnets: subnet-xxxxxx1, subnet-xxxxxx2
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # ACM SSL 인증서 적용 시 주석 해제
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:<ACCOUNT_ID>:certificate/xxxxxx
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
  - http:
      paths:
      # 1. API 요청 (/api/*) -> Backend Service
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      # 2. 정적 웹 요청 (/*) -> Frontend Service
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

